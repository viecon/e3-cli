name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: npx eslint packages/core/src/ packages/cli/src/ packages/cli/bin/ --ext .ts

      - name: Run tests
        run: pnpm test

      - name: Build core
        run: pnpm --filter @e3/core build

      - name: Build CLI
        run: pnpm --filter @e3/cli build

      - name: Test CLI help
        run: node packages/cli/dist/bin/e3.js --help
