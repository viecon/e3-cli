name: Update E3 Calendar

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @e3/core build && pnpm --filter @e3/cli build

      - name: Authenticate & Generate ICS
        env:
          E3_USERNAME: ${{ secrets.E3_USERNAME }}
          E3_PASSWORD: ${{ secrets.E3_PASSWORD }}
          E3_BASE_URL: https://e3p.nycu.edu.tw
        run: |
          # Get token directly via Moodle API (no interactive CLI needed)
          echo "Fetching token..."
          TOKEN=$(curl -s -X POST "$E3_BASE_URL/login/token.php" \
            -d "username=$E3_USERNAME&password=$E3_PASSWORD&service=moodle_mobile_app" \
            | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);if(j.token)process.stdout.write(j.token);else{console.error(j.error);process.exit(1)}})")

          if [ -z "$TOKEN" ]; then
            echo "Failed to get token"
            exit 1
          fi
          echo "Token obtained"

          # Write config
          echo "{\"token\":\"$TOKEN\",\"baseUrl\":\"$E3_BASE_URL\",\"authMode\":\"token\"}" > ~/.e3rc.json

          # Verify
          node packages/cli/dist/bin/e3.js whoami

          # Copy exams config
          [ -f exams.json ] && cp exams.json ~/.e3-exams.json

          # Generate ICS
          node packages/cli/dist/bin/e3.js calendar --ics public/e3-calendar.ics --ics-days 120
          echo "Events: $(grep -c 'BEGIN:VEVENT' public/e3-calendar.ics)"

      - name: Commit only if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet public/e3-calendar.ics 2>/dev/null; then
            echo "No changes, skipping commit"
          else
            git add public/e3-calendar.ics
            git commit -m "chore: update e3-calendar.ics [skip ci]"
            git push
          fi
